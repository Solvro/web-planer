name: Frontend - CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/frontend_ci.yaml"
      - "*"
      - "frontend/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/frontend_ci.yaml"
      - "*"
      - "frontend/**"

jobs:
  commitlint:
    name: Commitlint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run commitlint check
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }}

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: ./.github/composite-actions/install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck
        if: always()

  prettier:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: ./.github/composite-actions/install

      - name: Format check
        run: npm run format:check

  deadcode:
    name: Find deadcode
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: ./.github/composite-actions/install

      - name: Find deadcode
        run: npm run knip

  build:
    name: Test build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: ./.github/composite-actions/install

      - name: Build
        run: npm run build
        env:
          USOS_CONSUMER_KEY: hello
          USOS_CONSUMER_SECRET: jello
          NEXT_PUBLIC_API_URL: http://localhost:3333
          SEMESTER_START: "2024-10-01"
          SEMESTER_END: "2025-02-05"
          HOLIDAY_START: "2024-12-23"
          HOLIDAY_END: "2025-01-06"
          REFERENCE_WEEK_DATE: "2024-09-30"
          REFERENCE_WEEK_DATE_IS_EVEN: "true"
          FREE_DAYS_JSON: "[]"
          OVERRIDES_JSON: "[]"
