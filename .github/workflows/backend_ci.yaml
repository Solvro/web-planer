name: Backend - CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/backend_ci.yaml"
      - "*"
      - "backend/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/backend_ci.yaml"
      - "*"
      - "backend/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Set up AdonisJS environment
        run: |
          cp .env.development .env
          node ace generate:key

      - name: Lint
        run: npm run lint
        if: always()

      - name: Format
        run: npm run format:check
        if: always()

      - name: Type check
        run: npm run typecheck
        if: always()

      - name: Run Test Build
        run: npm run build
        if: always()

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: web_planer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Set up AdonisJS environment
        run: |
          cp .env.development .env
          node ace generate:key

      - name: Run migrations
        run: npm run test:prepare
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
