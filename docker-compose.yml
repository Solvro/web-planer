services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: planer
      POSTGRES_PASSWORD: planer
      POSTGRES_DB: planer
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  db-data:
  redis-data:
